<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SubIPTVPro — Premium IPTV | 35,000+ Channels, 4K Quality, Global Coverage</title>
    <meta name="description" content="SubIPTVPro offers 35,000+ live channels, 100,000+ VODs, and 4K streaming worldwide. Affordable plans starting from just a few euros. Instant activation. 30-day money-back guarantee." />
    <meta name="keywords" content="IPTV, premium IPTV, live TV channels, 4K streaming, IPTV subscription, Morocco IPTV, Europe IPTV, VOD, sports channels, IPTV service" />
    <meta name="author" content="SubIPTVPro" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://subscriptioniptvpro.com/" />

    <!-- Open Graph (Facebook, WhatsApp, LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://subscriptioniptvpro.com/" />
    <meta property="og:title" content="SubIPTVPro — Premium IPTV Service | 35,000+ Channels" />
    <meta property="og:description" content="Stream 35,000+ live channels and 100,000+ movies/series in crystal-clear 4K. Global coverage, instant activation, 30-day money-back guarantee." />
    <meta property="og:image" content="https://subscriptioniptvpro.com/og-image.jpg" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:site_name" content="SubIPTVPro" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://subscriptioniptvpro.com/" />
    <meta name="twitter:title" content="SubIPTVPro — Premium IPTV | 35,000+ Channels, 4K Quality" />
    <meta name="twitter:description" content="Stream 35,000+ live channels and 100,000+ movies/series in 4K. Plans start from €3.99/month. Instant activation." />
    <meta name="twitter:image" content="https://subscriptioniptvpro.com/og-image.jpg" />

    <!-- Theme color for mobile browsers -->
    <meta name="theme-color" content="#050816" />
  </head>
  <script>
    // Apply theme immediately before React renders to prevent flash
    (function() {
      var theme = localStorage.getItem('theme') || 'dark';
      if (theme === 'dark') {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
    })();
  </script>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
